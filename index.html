<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #8b5cf6;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --success: #10b981;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            font-size: 15px;
        }

        .nav-item:hover { background: var(--bg); color: var(--text); }
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: var(--shadow);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--primary);
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .nav-item.active .nav-badge { background: rgba(255,255,255,0.3); }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .data-path {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg);
            border-radius: var(--radius-sm);
            word-break: break-all;
            line-height: 1.4;
        }

        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--bg); }

        /* Main */
        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            min-width: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-title { font-size: 28px; font-weight: 700; }
        .header-subtitle { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }

        .save-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .save-status.saved { color: var(--success); border-color: var(--success); }
        .save-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .save-status.saved .save-dot { animation: none; }
        .save-status:not(.saved) .save-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Todo */
        .todo-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .todo-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        .todo-input::placeholder { color: var(--text-secondary); }

        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 20px -5px rgba(99,102,241,0.3); }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .todo-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .todo-list { display: flex; flex-direction: column; gap: 8px; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .todo-item:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateX(4px); }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }

        .checkbox-wrapper { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
        .checkbox-wrapper input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .checkbox-custom {
            width: 22px; height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: white;
            font-size: 14px;
        }
        .checkbox-wrapper input:checked + .checkbox-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .todo-text { flex: 1; font-size: 15px; word-break: break-word; }
        .todo-delete {
            width: 32px; height: 32px;
            border-radius: 8px; border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
        }
        .todo-item:hover .todo-delete { opacity: 1; }
        .todo-delete:hover { background: var(--danger); color: white; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* Notes */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .note-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .note-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 8px;
        }
        .note-title {
            font-size: 16px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text);
            width: 100%;
            outline: none;
            font-family: inherit;
            padding: 4px;
            border-radius: 4px;
            margin: -4px;
        }
        .note-title:focus { background: var(--bg); }
        .note-title::placeholder { color: var(--text-secondary); }

        .note-delete {
            width: 28px; height: 28px;
            border-radius: 6px; border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .note-delete:hover { background: var(--danger); color: white; }

        .note-content {
            width: 100%;
            min-height: 120px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            font-family: inherit;
            padding: 4px;
            border-radius: 4px;
            margin: -4px;
            flex: 1;
        }
        .note-content:focus { background: var(--bg); }
        .note-content::placeholder { color: var(--text-secondary); }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .note-color-picker { display: flex; gap: 6px; }
        .color-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: var(--text); }

        .add-note-card {
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            background: transparent;
        }
        .add-note-card:hover { border-color: var(--primary); color: var(--primary); background: var(--surface); }
        .add-note-icon { font-size: 32px; margin-bottom: 8px; }
        .add-note-text { font-weight: 600; }

        /* Note colors */
        .note-yellow { background: #fef9c3; border-color: #fde047; }
        .note-green { background: #dcfce7; border-color: #86efac; }
        .note-blue { background: #dbeafe; border-color: #93c5fd; }
        .note-purple { background: #f3e8ff; border-color: #d8b4fe; }
        .note-pink { background: #fce7f3; border-color: #f9a8d4; }
        .note-orange { background: #ffedd5; border-color: #fdba74; }

        [data-theme="dark"] .note-yellow { background: #422006; border-color: #a16207; }
        [data-theme="dark"] .note-green { background: #052e16; border-color: #166534; }
        [data-theme="dark"] .note-blue { background: #172554; border-color: #1e40af; }
        [data-theme="dark"] .note-purple { background: #3b0764; border-color: #6b21a8; }
        [data-theme="dark"] .note-pink { background: #500724; border-color: #9d174d; }
        [data-theme="dark"] .note-orange { background: #431407; border-color: #9a3412; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%; max-width: 400px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .modal-text { color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--bg); }
        .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-danger:hover { background: #dc2626; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease;
            font-size: 14px;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <div class="logo-text">FocusFlow</div>
            </div>

            <button class="nav-item active" onclick="switchTab('todo')">
                <span style="width:20px">☑</span>
                <span>待办清单</span>
                <span class="nav-badge" id="todo-count">0</span>
            </button>

            <button class="nav-item" onclick="switchTab('notes')">
                <span style="width:20px">📝</span>
                <span>便签</span>
                <span class="nav-badge" id="notes-count">0</span>
            </button>

            <div class="sidebar-footer">
                <div class="data-path" id="data-path">数据位置: 加载中...</div>
                <button class="btn-secondary" onclick="exportData()">
                    <span>💾</span><span>导出备份</span>
                </button>
                <button class="btn-secondary" onclick="importData()">
                    <span>📂</span><span>导入恢复</span>
                </button>
                <button class="btn-secondary" onclick="openBackupFolder()">
                    <span>📁</span><span>打开备份文件夹</span>
                </button>
                <button class="btn-secondary" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span><span id="theme-text">深色模式</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div id="todo-section">
                <div class="header">
                    <div>
                        <h1 class="header-title">待办清单</h1>
                        <p class="header-subtitle">管理你的任务，保持专注</p>
                    </div>
                    <div class="save-status" id="save-status">
                        <span class="save-dot"></span><span>就绪</span>
                    </div>
                </div>

                <div class="todo-input-wrapper">
                    <input type="text" class="todo-input" id="todo-input" placeholder="添加新任务，按 Enter 确认..." onkeypress="handleTodoKeypress(event)">
                    <button class="btn-primary" onclick="addTodo()">
                        <span>+</span><span>添加</span>
                    </button>
                </div>

                <div class="todo-stats" id="todo-stats"></div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
                <div class="todo-list" id="todo-list"></div>
            </div>

            <div id="notes-section" style="display:none">
                <div class="header">
                    <div>
                        <h1 class="header-title">便签</h1>
                        <p class="header-subtitle">记录灵感，随时编辑</p>
                    </div>
                </div>
                <div class="notes-grid" id="notes-grid">
                    <div class="note-card add-note-card" onclick="addNote()">
                        <div class="add-note-icon">+</div>
                        <div class="add-note-text">新建便签</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-title" id="modal-title">提示</div>
            <div class="modal-text" id="modal-text">内容</div>
            <div class="modal-actions" id="modal-actions">
                <button class="btn" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据管理 ====================
        let data = { todos: [], notes: [] };
        let currentTab = 'todo';
        let saveTimeout = null;

        const NOTE_COLORS = [
            { name: 'default', class: '' },
            { name: 'yellow', class: 'note-yellow' },
            { name: 'green', class: 'note-green' },
            { name: 'blue', class: 'note-blue' },
            { name: 'purple', class: 'note-purple' },
            { name: 'pink', class: 'note-pink' },
            { name: 'orange', class: 'note-orange' }
        ];

        // 初始化
        async function init() {
            // 加载主题
            const savedTheme = localStorage.getItem('focusflow_theme');
            if (savedTheme === 'dark') toggleTheme();

            // 加载数据（通过 Electron API 读取本地文件）
            try {
                data = await window.electronAPI.loadData();
                showToast('数据已加载', 'success');
            } catch (e) {
                showToast('加载数据失败，使用默认数据', 'error');
            }

            // 显示数据存储路径
            try {
                const dataPath = await window.electronAPI.getDataPath();
                document.getElementById('data-path').textContent = '数据位置: ' + dataPath;
            } catch(e) {}

            renderTodos();
            renderNotes();
            updateCounts();
        }

        // 保存到本地文件（自动备份）
        async function saveToFile() {
            showSavingStatus();
            try {
                const result = await window.electronAPI.saveData(data);
                if (result.success) {
                    showSavedStatus();
                    showToast('已自动保存并备份', 'success');
                }
            } catch (e) {
                showToast('保存失败', 'error');
            }
        }

        function debounceSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToFile, 800);
        }

        // ==================== UI 状态 ====================
        function showSavingStatus() {
            const el = document.getElementById('save-status');
            el.classList.remove('saved');
            el.innerHTML = '<span class="save-dot"></span><span>保存中...</span>';
        }
        function showSavedStatus() {
            const el = document.getElementById('save-status');
            el.classList.add('saved');
            el.innerHTML = '<span class="save-dot"></span><span>已保存到本地</span>';
            setTimeout(() => {
                el.classList.remove('saved');
                el.innerHTML = '<span class="save-dot"></span><span>就绪</span>';
            }, 2000);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== 标签切换 ====================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', (tab === 'todo' && i === 0) || (tab === 'notes' && i === 1));
            });
            document.getElementById('todo-section').style.display = tab === 'todo' ? 'block' : 'none';
            document.getElementById('notes-section').style.display = tab === 'notes' ? 'block' : 'none';
            if (tab === 'todo') renderTodos();
            else renderNotes();
        }

        // ==================== 待办清单 ====================
        function handleTodoKeypress(e) { if (e.key === 'Enter') addTodo(); }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;

            data.todos.unshift({
                id: Date.now(),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            });
            input.value = '';
            renderTodos();
            debounceSave();
            updateCounts();
        }

        function toggleTodo(id) {
            const todo = data.todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                renderTodos();
                debounceSave();
                updateCounts();
            }
        }

        function deleteTodo(id) {
            data.todos = data.todos.filter(t => t.id !== id);
            renderTodos();
            debounceSave();
            updateCounts();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            const stats = document.getElementById('todo-stats');
            const progress = document.getElementById('progress-fill');

            if (data.todos.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div style="font-size:16px;margin-bottom:8px">暂无任务</div><div style="opacity:0.7">在上方输入框添加你的第一个任务</div></div>';
                stats.innerHTML = '';
                progress.style.width = '0%';
                return;
            }

            const completed = data.todos.filter(t => t.completed).length;
            const total = data.todos.length;
            const percent = total > 0 ? (completed / total * 100) : 0;

            stats.innerHTML = `<div>总计: ${total}</div><div>已完成: ${completed}</div><div>待完成: ${total - completed}</div>`;
            progress.style.width = percent + '%';

            list.innerHTML = data.todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                        <div class="checkbox-custom">✓</div>
                    </div>
                    <div class="todo-text">${escapeHtml(todo.text)}</div>
                    <button class="todo-delete" onclick="deleteTodo(${todo.id})" title="删除">✕</button>
                </div>
            `).join('');
        }

        // ==================== 便签 ====================
        function addNote() {
            data.notes.unshift({
                id: Date.now(),
                title: '',
                content: '',
                color: 'default',
                updatedAt: new Date().toISOString()
            });
            renderNotes();
            debounceSave();
            updateCounts();
            setTimeout(() => {
                const titles = document.querySelectorAll('.note-title');
                if (titles[0]) titles[0].focus();
            }, 50);
        }

        function updateNote(id, field, value) {
            const note = data.notes.find(n => n.id === id);
            if (note) {
                note[field] = value;
                note.updatedAt = new Date().toISOString();
                debounceSave();
            }
        }

        function updateNoteColor(id, colorName) {
            const note = data.notes.find(n => n.id === id);
            if (note) {
                note.color = colorName;
                note.updatedAt = new Date().toISOString();
                renderNotes();
                debounceSave();
            }
        }

        function deleteNote(id) {
            data.notes = data.notes.filter(n => n.id !== id);
            renderNotes();
            debounceSave();
            updateCounts();
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            const notesHtml = data.notes.map(note => {
                const colorClass = NOTE_COLORS.find(c => c.name === note.color)?.class || '';
                const dateStr = new Date(note.updatedAt).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="note-card ${colorClass}">
                        <div class="note-header">
                            <input type="text" class="note-title" placeholder="便签标题..." value="${escapeHtml(note.title)}"
                                oninput="updateNote(${note.id}, 'title', this.value)">
                            <button class="note-delete" onclick="deleteNote(${note.id})" title="删除">✕</button>
                        </div>
                        <textarea class="note-content" placeholder="在此输入内容..." 
                            oninput="updateNote(${note.id}, 'content', this.value)">${escapeHtml(note.content)}</textarea>
                        <div class="note-footer">
                            <div class="note-color-picker">
                                ${NOTE_COLORS.map(c => `
                                    <div class="color-dot ${c.class || ''} ${note.color === c.name ? 'active' : ''}" 
                                        style="${c.name === 'default' ? 'background:var(--surface);border:2px solid var(--border)' : ''}"
                                        onclick="updateNoteColor(${note.id}, '${c.name}')"
                                        title="${c.name}"></div>
                                `).join('')}
                            </div>
                            <span>${dateStr}</span>
                        </div>
                    </div>
                `;
            }).join('');

            grid.innerHTML = `
                <div class="note-card add-note-card" onclick="addNote()">
                    <div class="add-note-icon">+</div>
                    <div class="add-note-text">新建便签</div>
                </div>
                ${notesHtml}
            `;
        }

        // ==================== 导入导出 ====================
        async function exportData() {
            try {
                const result = await window.electronAPI.exportData(data);
                if (result.success) {
                    showToast('已导出到: ' + result.path, 'success');
                }
            } catch (e) {
                showToast('导出失败', 'error');
            }
        }

        async function importData() {
            try {
                const result = await window.electronAPI.importData();
                if (result.success) {
                    data = result.data;
                    renderTodos();
                    renderNotes();
                    updateCounts();
                    showToast('数据恢复成功', 'success');
                } else if (result.error) {
                    showToast(result.error, 'error');
                }
            } catch (e) {
                showToast('导入失败', 'error');
            }
        }

        async function openBackupFolder() {
            try {
                await window.electronAPI.openBackupFolder();
            } catch (e) {
                showToast('无法打开文件夹', 'error');
            }
        }

        // ==================== 主题 ====================
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('focusflow_theme', 'light');
                document.getElementById('theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = '深色模式';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('focusflow_theme', 'dark');
                document.getElementById('theme-icon').textContent = '☀';
                document.getElementById('theme-text').textContent = '浅色模式';
            }
        }

        // ==================== 工具函数 ====================
        function updateCounts() {
            document.getElementById('todo-count').textContent = data.todos.filter(t => !t.completed).length;
            document.getElementById('notes-count').textContent = data.notes.length;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showModal(title, text, actions) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-text').textContent = text;
            document.getElementById('modal-actions').innerHTML = actions || '<button class="btn" onclick="closeModal()">关闭</button>';
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        // 快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                exportData();
            }
        });

        // 启动
        init();
    </script>
</body>
</html>
